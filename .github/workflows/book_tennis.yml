name: Book Tennis Court - Sagene

on:
  # Manuell trigger fra GitHub UI
  workflow_dispatch:
    inputs:
      date:
        description: 'Dato å booke (YYYY-MM-DD)'
        required: true
      times:
        description: 'Ønskede tider, f.eks. "19:00 20:00"'
        required: true
        default: '19:00 20:00'
      midnight:
        description: 'Vent til midnatt før booking'
        type: boolean
        default: false

  # Automatisk trigger: kjør når next_booking.json oppdateres med active=true
  push:
    branches: [main]
    paths: ['tennis/next_booking.json']

  # Planlagt: kl 23:55 Oslo-tid
  schedule:
    - cron: '55 21 * * *'   # CEST (sommer, UTC+2)
    - cron: '55 22 * * *'   # CET  (vinter, UTC+1)

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright

      - name: Install Python dependencies
        run: |
          cd tennis
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # --- Manuell kjøring (workflow_dispatch) ---
      - name: Book (manuell)
        if: github.event_name == 'workflow_dispatch'
        env:
          MATCHI_EMAIL: ${{ secrets.MATCHI_EMAIL }}
          MATCHI_PASSWORD: ${{ secrets.MATCHI_PASSWORD }}
          TZ: Europe/Oslo
        run: |
          cd tennis
          ARGS="--date ${{ github.event.inputs.date }} --times ${{ github.event.inputs.times }} --headless"
          if [ "${{ github.event.inputs.midnight }}" = "true" ]; then
            ARGS="$ARGS --midnight --max-wait 10"
          fi
          echo "Kjører: python book_tennis.py $ARGS"
          python book_tennis.py $ARGS

      # --- Push-trigger: kjør når next_booking.json er oppdatert ---
      - name: Les next_booking.json
        if: github.event_name == 'push' || github.event_name == 'schedule'
        id: read_config
        run: |
          DATE=$(python3 -c "import json; d=json.load(open('tennis/next_booking.json')); print(d.get('date',''))")
          TIMES=$(python3 -c "import json; d=json.load(open('tennis/next_booking.json')); print(' '.join(d.get('times',[])))")
          ACTIVE=$(python3 -c "import json; d=json.load(open('tennis/next_booking.json')); print(d.get('active', False))")
          MIDNIGHT=$(python3 -c "import json; d=json.load(open('tennis/next_booking.json')); print(d.get('midnight', False))")
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "times=$TIMES" >> $GITHUB_OUTPUT
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "midnight=$MIDNIGHT" >> $GITHUB_OUTPUT
          echo "Booking: $DATE kl $TIMES (aktiv: $ACTIVE, midnatt: $MIDNIGHT)"

      - name: Book (push/scheduled)
        if: (github.event_name == 'push' || github.event_name == 'schedule') && steps.read_config.outputs.active == 'True'
        env:
          MATCHI_EMAIL: ${{ secrets.MATCHI_EMAIL }}
          MATCHI_PASSWORD: ${{ secrets.MATCHI_PASSWORD }}
          TZ: Europe/Oslo
        run: |
          cd tennis
          DATE="${{ steps.read_config.outputs.date }}"
          TIMES="${{ steps.read_config.outputs.times }}"
          MIDNIGHT="${{ steps.read_config.outputs.midnight }}"
          ARGS="--date $DATE --times $TIMES --headless"
          if [ "$MIDNIGHT" = "True" ]; then
            ARGS="$ARGS --midnight --max-wait 10"
          fi
          echo "Kjører: python book_tennis.py $ARGS"
          python book_tennis.py $ARGS

      - name: Deaktiver booking etter kjøring
        if: (github.event_name == 'push' || github.event_name == 'schedule') && steps.read_config.outputs.active == 'True'
        run: |
          python3 -c "
import json
with open('tennis/next_booking.json') as f:
    d = json.load(f)
d['active'] = False
with open('tennis/next_booking.json', 'w') as f:
    json.dump(d, f, indent=2)
"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tennis/next_booking.json
          git commit -m "Deaktiver booking etter kjøring $(date +'%Y-%m-%d')"
          git push
