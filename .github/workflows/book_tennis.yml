name: Book Tennis Court - Sagene

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Dato å booke (YYYY-MM-DD)'
        required: true
      times:
        description: 'Ønskede tider, f.eks. "19:00 20:00"'
        required: true
        default: '19:00 20:00'
      midnight:
        description: 'Vent til midnatt før booking'
        type: boolean
        default: false

  push:
    branches: [main]
    paths: ['tennis/next_booking.json']

  schedule:
    - cron: '55 21 * * *'
    - cron: '55 22 * * *'

jobs:
  book:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          cd tennis
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Book (manuell)
        if: github.event_name == 'workflow_dispatch'
        env:
          MATCHI_EMAIL: ${{ secrets.MATCHI_EMAIL }}
          MATCHI_PASSWORD: ${{ secrets.MATCHI_PASSWORD }}
          TZ: Europe/Oslo
        run: |
          cd tennis
          ARGS="--date ${{ github.event.inputs.date }} --times ${{ github.event.inputs.times }} --headless"
          if [ "${{ github.event.inputs.midnight }}" = "true" ]; then
            ARGS="$ARGS --midnight --max-wait 10"
          fi
          echo "Kjører: python book_tennis.py $ARGS"
          python book_tennis.py $ARGS

      - name: Les next_booking.json
        if: github.event_name == 'push' || github.event_name == 'schedule'
        id: cfg
        run: |
          cd tennis
          echo "date=$(python3 -c 'import json; d=json.load(open("next_booking.json")); print(d["date"])')" >> $GITHUB_OUTPUT
          echo "times=$(python3 -c 'import json; d=json.load(open("next_booking.json")); print(" ".join(d["times"]))')" >> $GITHUB_OUTPUT
          echo "active=$(python3 -c 'import json; d=json.load(open("next_booking.json")); print(d["active"])')" >> $GITHUB_OUTPUT
          echo "midnight=$(python3 -c 'import json; d=json.load(open("next_booking.json")); print(d.get("midnight",False))')" >> $GITHUB_OUTPUT

      - name: Book (push/scheduled)
        if: (github.event_name == 'push' || github.event_name == 'schedule') && steps.cfg.outputs.active == 'True'
        env:
          MATCHI_EMAIL: ${{ secrets.MATCHI_EMAIL }}
          MATCHI_PASSWORD: ${{ secrets.MATCHI_PASSWORD }}
          TZ: Europe/Oslo
        run: |
          cd tennis
          ARGS="--date ${{ steps.cfg.outputs.date }} --times ${{ steps.cfg.outputs.times }} --headless"
          if [ "${{ steps.cfg.outputs.midnight }}" = "True" ]; then
            ARGS="$ARGS --midnight --max-wait 10"
          fi
          echo "Kjører: python book_tennis.py $ARGS"
          python book_tennis.py $ARGS

      - name: Last opp debug-skjermbilder
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: tennis/debug_*.png
          if-no-files-found: ignore

      - name: Deaktiver booking etter kjøring
        if: (github.event_name == 'push' || github.event_name == 'schedule') && steps.cfg.outputs.active == 'True'
        run: |
          jq '.active = false' tennis/next_booking.json > tmp.json && mv tmp.json tennis/next_booking.json
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tennis/next_booking.json
          git commit -m "Deaktiver booking etter kjøring"
          git push
